# Server Configuration
server.port=8081
server.servlet.context-path=/api

# Spring Application Name
spring.application.name=customer-management-system

# DataSource Configuration - MariaDB (Updated for your phpMyAdmin)
# Changed username from 'cms_user' to 'root'
# Removed password (empty as per your setup)
# Removed rewriteBatchedStatements for compatibility
spring.datasource.url=jdbc:mariadb://localhost:3307/customer_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate (Changed ddl-auto from 'validate' to 'update' for auto table creation)
spring.jpa.database-platform=org.hibernate.dialect.MariaDB103Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Async Executor for Bulk Upload
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# Cache (Changed from caffeine to simple to avoid configuration issues)
spring.cache.type=simple

# Logging (Increased logging level for debugging)
logging.level.com.cms=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.tool.hbm2ddl=DEBUG

# Jackson
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
